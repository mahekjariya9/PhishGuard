<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PhishGuard</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 560px; margin: 60px auto; color: #1a1a1a; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.sub { color: #666; margin-bottom: 24px; }
  input[type=text] { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
  button { margin-top: 12px; padding: 10px 18px; font-size: 14px; background: #1a1a1a; color: white; border: none; border-radius: 6px; cursor: pointer; }
  #result { margin-top: 24px; padding: 16px; border-radius: 8px; font-size: 14px; display: none; }
  .phishing { background: #fdecea; border: 1px solid #f5c2c0; }
  .legitimate { background: #e9f6ec; border: 1px solid #b8e2c0; }
</style>
</head>
<body>
  <h1>PhishGuard</h1>
  <p class="sub">AI-powered phishing URL detector — paste a URL to classify it.</p>
  <input type="text" id="urlInput" placeholder="https://example.com/login">
  <button onclick="checkUrl()">Check URL</button>
  <div id="result"></div>

<script>
async function checkUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  const res = await fetch('/predict', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url })
  });
  const data = await res.json();
  const box = document.getElementById('result');
  box.style.display = 'block';
  box.className = data.is_phishing ? 'phishing' : 'legitimate';
  box.innerHTML = `<strong>${data.label.toUpperCase()}</strong> (confidence: ${(data.confidence * 100).toFixed(1)}%)<br>${data.url}`;
}
</script>
</body>
</html>
